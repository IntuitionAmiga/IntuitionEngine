# IE65 Linker Configuration for programs with large embedded binary data
# CODE/RODATA/DATA/BSS stay within 16-bit address space for CPU instructions
# BINDATA goes into a separate area (accessed only via MMIO/DMA, not direct CPU addressing)
# 6502 programs load at $0800 by default
#
# IMPORTANT: RAM must use fill=yes so ld65 pads code to full $7800 size.
# The IE loader does a linear load at $0800, so BINRAM must follow RAM
# contiguously in the file for addresses to resolve correctly.

MEMORY {
    ZP:     start = $0002, size = $00FE, type = rw;
    RAM:    start = $0800, size = $7800, type = rw, file = %O, fill = yes;
    BINRAM: start = $8000, size = $78000, type = rw, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP, type = zp;
    CODE:     load = RAM, type = ro;
    RODATA:   load = RAM, type = ro;
    DATA:     load = RAM, type = rw;
    BSS:      load = RAM, type = bss;
    BINDATA:  load = BINRAM, type = ro, optional = yes;
}

FEATURES {
    STARTADDRESS: default = $0800;
}
